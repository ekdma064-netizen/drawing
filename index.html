<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>살아있는 그림 🎨</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0a0a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
h1 { font-size: 1.7rem; font-weight: 800; background: linear-gradient(90deg,#a78bfa,#60a5fa,#f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin: 8px 0 4px; }
.sub { color: #888; font-size: 0.9rem; text-align: center; margin-bottom: 20px; }
.card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; width: 100%; max-width: 580px; margin-bottom: 16px; }
label.upload { display: flex; flex-direction: column; align-items: center; border: 2px dashed rgba(167,139,250,0.5); background: rgba(167,139,250,0.05); color: #a78bfa; font-weight: 700; padding: 36px 20px; border-radius: 16px; cursor: pointer; text-align: center; gap: 8px; }
label.upload:hover { background: rgba(167,139,250,0.1); }
button { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
button:hover { opacity: 0.88; }
.btn-purple { background: linear-gradient(135deg,#7c3aed,#4f46e5); color: white; }
.btn-yellow { background: linear-gradient(135deg,#f59e0b,#ef4444); color: white; font-size: 1.1rem; }
.btn-gray { background: rgba(255,255,255,0.1); color: #aaa; }
.btn-green { background: linear-gradient(135deg,#10b981,#3b82f6); color: white; }
#snapVideoBox { display: none; position: relative; margin-top: 12px; }
#snapVideo { width: 100%; border-radius: 12px; display: block; }
#snapBtn { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 50%; background: white; border: 4px solid #7c3aed; font-size: 1.5rem; cursor: pointer; margin-top: 0; padding: 0; }
img.preview { width: 100%; border-radius: 12px; display: block; }
.spinner-wrap { text-align: center; padding: 30px; }
.spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
/* AR 캔버스 — 전체를 캔버스 하나로 */
#arCanvas { display: block; width: 100%; border-radius: 16px; background: #111; }
.desc { background: rgba(167,139,250,0.1); border-left: 3px solid #a78bfa; border-radius: 10px; padding: 14px 16px; margin-top: 14px; font-size: 0.9rem; color: #ccc; line-height: 1.6; }
.hidden { display: none !important; }
.hint { text-align: center; font-size: 0.78rem; color: #555; margin-top: 6px; }
.tip { background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.2); border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; color: #bbb; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>

<div style="font-size:2.5rem;text-align:center;margin-top:4px">🎨</div>
<h1>살아있는 그림</h1>
<p class="sub">피사체가 AR로 튀어나와요! ✨</p>

<!-- 업로드 -->
<div class="card" id="cardUpload">
  <label class="upload" for="fileIn">
    <span style="font-size:2rem">🖼️</span>
    <span>여기를 눌러서 그림을 업로드하세요</span>
    <span style="font-size:0.8rem;color:#555;font-weight:400">흰 배경 그림이 가장 잘 돼요!</span>
    <input type="file" id="fileIn" accept="image/*" style="display:none">
  </label>
  <button class="btn-purple" id="camBtn">📷 카메라로 찍기</button>
  <div id="snapVideoBox">
    <video id="snapVideo" autoplay playsinline muted></video>
    <button id="snapBtn">📸</button>
  </div>
  <div class="tip">💡 하얀 종이에 그린 그림을 찍으면 배경이 자동 제거돼요!</div>
</div>

<!-- 미리보기 -->
<div class="card hidden" id="cardPreview">
  <img class="preview" id="previewImg" alt="">
  <button class="btn-yellow" id="goBtn">✨ AR로 살려줘!</button>
  <button class="btn-gray" id="resetBtn1">🔄 다시 선택</button>
</div>

<!-- 로딩 -->
<div class="card hidden" id="cardLoading">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <p id="loadingText" style="color:#888">AI가 분석 중... 🔍</p>
  </div>
</div>

<!-- 결과 -->
<div class="card hidden" id="cardResult">
  <!-- 단일 캔버스에 카메라+피사체 모두 렌더 -->
  <canvas id="arCanvas"></canvas>
  <p class="hint">피사체가 카메라 위에서 움직여요! 📷</p>
  <div class="desc" id="descText"></div>
  <button class="btn-green" id="reBtn" style="margin-top:14px">🔮 다시 시작</button>
  <button class="btn-gray" id="resetBtn2">🔄 새 그림 선택</button>
</div>

<!-- 숨겨진 AR용 video (카메라 피드) -->
<video id="arVidHidden" autoplay playsinline muted style="display:none;position:absolute;top:-9999px;"></video>

<script>
var imgSrc=null, b64=null, snapStream=null, arStream=null, arRaf=null;
var subjectCanvases=[], lastTheme='generic';

var EMOJIS={nature:["🌸","🍃","🦋","🌻"],ocean:["🐠","🫧","🌊","🐙"],space:["⭐","✨","💫","🌟"],animals:["🐾","💕","✨","🌟"],people:["💗","🎵","✨","🎉"],vehicles:["💨","⭐","💥","🌟"],fantasy:["✨","💫","🌈","🔮"],generic:["✨","⭐","💫","🌟"]};

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function stopRaf(){if(arRaf){cancelAnimationFrame(arRaf);arRaf=null;}}
function stopAR(){stopRaf();if(arStream){arStream.getTracks().forEach(function(t){t.stop();});arStream=null;}}

// 파일 업로드
document.getElementById('fileIn').addEventListener('change',function(){
  var file=this.files[0]; if(!file)return;
  var r=new FileReader();
  r.onload=function(e){imgSrc=e.target.result;b64=e.target.result.split(',')[1];document.getElementById('previewImg').src=imgSrc;hide('cardUpload');show('cardPreview');};
  r.readAsDataURL(file);
});

// 찍기용 카메라
document.getElementById('camBtn').addEventListener('click',function(){
  if(snapStream){stopSnapCam();return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(s){snapStream=s;document.getElementById('snapVideo').srcObject=s;document.getElementById('snapVideoBox').style.display='block';document.getElementById('camBtn').textContent='✖ 닫기';})
    .catch(function(){alert('카메라를 사용할 수 없어요. 파일 업로드를 이용해주세요.');});
});
document.getElementById('snapBtn').addEventListener('click',function(){
  var v=document.getElementById('snapVideo'),c=document.createElement('canvas');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(function(blob){var r=new FileReader();r.onload=function(e){imgSrc=e.target.result;b64=e.target.result.split(',')[1];document.getElementById('previewImg').src=imgSrc;stopSnapCam();hide('cardUpload');show('cardPreview');};r.readAsDataURL(blob);},'image/jpeg',0.92);
});
function stopSnapCam(){if(snapStream){snapStream.getTracks().forEach(function(t){t.stop();});snapStream=null;}document.getElementById('snapVideoBox').style.display='none';document.getElementById('camBtn').textContent='📷 카메라로 찍기';}

function reset(){stopAR();stopSnapCam();subjectCanvases=[];b64=null;imgSrc=null;document.getElementById('fileIn').value='';hide('cardPreview');hide('cardResult');hide('cardLoading');show('cardUpload');}
document.getElementById('resetBtn1').addEventListener('click',reset);
document.getElementById('resetBtn2').addEventListener('click',reset);
document.getElementById('reBtn').addEventListener('click',function(){stopAR();setTimeout(startAR,100);});

// ── 배경 제거 ──
function removeBackground(imgEl,tol){
  tol=tol||55;
  var c=document.createElement('canvas');
  c.width=imgEl.naturalWidth||imgEl.width||200;
  c.height=imgEl.naturalHeight||imgEl.height||200;
  var ctx=c.getContext('2d');
  ctx.drawImage(imgEl,0,0,c.width,c.height);
  var W=c.width,H=c.height;
  var d=ctx.getImageData(0,0,W,H),px=d.data;

  // 가장자리 샘플로 배경색 추정
  var rs=0,gs=0,bs=0,n=0;
  var step=Math.max(1,Math.floor(Math.max(W,H)/30));
  for(var x=0;x<W;x+=step){var i=(0*W+x)*4;rs+=px[i];gs+=px[i+1];bs+=px[i+2];n++;i=((H-1)*W+x)*4;rs+=px[i];gs+=px[i+1];bs+=px[i+2];n++;}
  for(var y=0;y<H;y+=step){var i=(y*W+0)*4;rs+=px[i];gs+=px[i+1];bs+=px[i+2];n++;i=(y*W+(W-1))*4;rs+=px[i];gs+=px[i+1];bs+=px[i+2];n++;}
  var br=rs/n,bg=gs/n,bb=bs/n;

  for(var i=0;i<px.length;i+=4){
    var dr=px[i]-br,dg=px[i+1]-bg,db=px[i+2]-bb;
    var dist=Math.sqrt(dr*dr+dg*dg+db*db);
    if(dist<tol){px[i+3]=Math.round(px[i+3]*Math.max(0,(dist-tol*0.3)/(tol*0.7)));}
  }
  ctx.putImageData(d,0,0);
  return c;
}

// ── 피사체 분리 ──
function extractSubjects(bgC,maxN){
  maxN=maxN||5;
  var W=bgC.width,H=bgC.height;
  var px=bgC.getContext('2d').getImageData(0,0,W,H).data;
  var cols=[];
  for(var x=0;x<W;x++){var has=false;for(var y=0;y<H;y++){if(px[(y*W+x)*4+3]>15){has=true;break;}}cols.push(has);}
  var segs=[],inS=false,sX=0;
  for(var x=0;x<W;x++){if(cols[x]&&!inS){inS=true;sX=x;}else if(!cols[x]&&inS){inS=false;if(x-sX>W*0.02)segs.push([sX,x-1]);}}
  if(inS)segs.push([sX,W-1]);
  segs=segs.filter(function(s){return s[1]-s[0]>W*0.02;});
  while(segs.length>maxN){var minG=Infinity,mi=0;for(var i=0;i<segs.length-1;i++){var g=segs[i+1][0]-segs[i][1];if(g<minG){minG=g;mi=i;}}segs[mi]=[segs[mi][0],segs[mi+1][1]];segs.splice(mi+1,1);}
  if(segs.length===0)return [bgC];
  return segs.map(function(seg){
    var x0=Math.max(0,seg[0]-3),x1=Math.min(W-1,seg[1]+3);
    var yMin=H,yMax=0;
    for(var x=x0;x<=x1;x++)for(var y=0;y<H;y++){if(px[(y*W+x)*4+3]>15){if(y<yMin)yMin=y;if(y>yMax)yMax=y;}}
    yMin=Math.max(0,yMin-3);yMax=Math.min(H-1,yMax+3);
    var sc=document.createElement('canvas');
    sc.width=x1-x0+1;sc.height=yMax-yMin+1;
    sc.getContext('2d').drawImage(bgC,x0,yMin,sc.width,sc.height,0,0,sc.width,sc.height);
    return sc;
  });
}

// ── AI 분석 + 시작 ──
document.getElementById('goBtn').addEventListener('click',function(){
  if(!b64)return;
  hide('cardPreview');show('cardLoading');
  document.getElementById('loadingText').textContent='AI가 분석 중... 🔍';

  function process(theme,desc){
    lastTheme=theme||'generic';
    document.getElementById('descText').textContent=desc||'멋진 그림이에요! ✨';
    document.getElementById('loadingText').textContent='피사체 추출 중... ✂️';
    var img=new Image();
    img.onload=function(){
      var bgR=removeBackground(img,55);
      subjectCanvases=extractSubjects(bgR,5);
      hide('cardLoading');show('cardResult');
      setTimeout(startAR,200);
    };
    img.src=imgSrc;
  }

  fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})})
    .then(function(r){return r.json();})
    .then(function(d){process(d.theme,d.description);})
    .catch(function(){process('generic','멋진 그림이에요! ✨');});
});

// ── AR 메인 ──
function startAR(){
  stopAR();
  var arVid=document.getElementById('arVidHidden');
  var canvas=document.getElementById('arCanvas');
  var W=canvas.parentElement.offsetWidth||540;
  var H=Math.round(W*9/16); // 16:9 비율
  canvas.width=W;
  canvas.height=H;
  canvas.style.height=H+'px';
  var ctx=canvas.getContext('2d');
  var emojis=EMOJIS[lastTheme]||EMOJIS.generic;

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:'environment',width:{ideal:W},height:{ideal:H}},
    audio:false
  })
  .then(function(s){
    arStream=s;
    arVid.srcObject=s;
    arVid.play();

    // 스프라이트 생성 (카메라 열리기 전에 미리)
    var sprites=[];
    var TYPES=['walk','bounce','float'];
    subjectCanvases.forEach(function(sc,i){
      var asp=sc.width/sc.height;
      var sh=H*(0.22+Math.random()*0.12);
      var sw=sh*asp;
      var type=TYPES[i%TYPES.length];
      sprites.push({
        canvas:sc,
        w:sw,h:sh,
        x:Math.random()*(W-sw),
        y:H-sh-10,
        baseY:H-sh-10,
        vx:(Math.random()>0.5?1:-1)*(1.5+Math.random()*2),
        vy:0,
        life:Math.random()*Math.PI*2,
        type:type,
        flipX:false,
        actionT:0,
        actionMax:120+Math.random()*200,
        jumping:false,
        bubble:null
      });
    });

    var particles=Array.from({length:10},function(){
      return{x:Math.random()*W,y:Math.random()*H,em:emojis[Math.floor(Math.random()*emojis.length)],sz:16+Math.random()*10,vx:(Math.random()-0.5)*0.8,vy:-0.5-Math.random()*0.5,life:Math.random()*Math.PI*2,ls:0.02};
    });

    function loop(){
      // 카메라 프레임 그리기
      if(arVid.readyState>=2){
        ctx.drawImage(arVid,0,0,W,H);
      } else {
        ctx.fillStyle='#111';
        ctx.fillRect(0,0,W,H);
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.font='14px sans-serif';
        ctx.textAlign='center';
        ctx.fillText('카메라 준비 중...', W/2, H/2);
      }

      // 피사체 업데이트 + 그리기
      sprites.forEach(function(sp){
        sp.life+=0.04;
        sp.actionT++;

        // 자율 행동
        if(sp.actionT>sp.actionMax){
          sp.actionT=0;
          sp.actionMax=100+Math.random()*220;
          var r=Math.random();
          if(r<0.35&&!sp.jumping&&sp.type==='walk'){
            sp.jumping=true;
            sp.vy=-(7+Math.random()*5);
            var blist=['😊','🎉','✨','💪','🌟','😄','🎈'];
            sp.bubble={em:blist[Math.floor(Math.random()*blist.length)],a:0,phase:'in',t:0};
          } else if(r<0.6){
            sp.vx*=-1;sp.flipX=!sp.flipX;
          } else {
            sp.vx=(Math.random()>0.5?1:-1)*(1.2+Math.random()*2.5);
            sp.flipX=sp.vx<0;
          }
        }

        // 이동
        if(sp.type==='walk'){
          sp.x+=sp.vx;
          if(sp.jumping||sp.vy!==0){sp.vy+=0.4;sp.y+=sp.vy;if(sp.y>=sp.baseY){sp.y=sp.baseY;sp.vy=0;sp.jumping=false;}}
          else{sp.y=sp.baseY+Math.sin(sp.life*2)*2;}
        } else if(sp.type==='bounce'){
          sp.x+=sp.vx;
          sp.vy+=0.35;sp.y+=sp.vy;
          if(sp.y+sp.h>=H-5){sp.y=H-sp.h-5;sp.vy=-(5+Math.random()*4);}
        } else { // float
          sp.x+=sp.vx+Math.cos(sp.life*0.7)*0.8;
          sp.y=sp.baseY-60+Math.sin(sp.life*0.9)*35;
        }

        // 경계
        if(sp.x<0){sp.x=0;sp.vx=Math.abs(sp.vx);sp.flipX=false;}
        if(sp.x+sp.w>W){sp.x=W-sp.w;sp.vx=-Math.abs(sp.vx);sp.flipX=true;}
        sp.y=Math.max(0,Math.min(H-sp.h,sp.y));

        // 그림자
        var gy=Math.min(sp.y+sp.h+4,H-4);
        var ga=Math.max(0.05,0.3*(1-Math.abs(sp.y+sp.h-sp.baseY-sp.h)/H));
        ctx.save();ctx.globalAlpha=ga;ctx.fillStyle='#000';
        ctx.beginPath();ctx.ellipse(sp.x+sp.w/2,gy,sp.w*0.38,6,0,0,Math.PI*2);ctx.fill();ctx.restore();

        // 피사체
        ctx.save();
        if(sp.flipX){ctx.translate(sp.x+sp.w,sp.y);ctx.scale(-1,1);ctx.drawImage(sp.canvas,0,0,sp.w,sp.h);}
        else{ctx.drawImage(sp.canvas,sp.x,sp.y,sp.w,sp.h);}
        ctx.restore();

        // 말풍선
        if(sp.bubble){
          sp.bubble.t++;
          if(sp.bubble.phase==='in')sp.bubble.a=Math.min(1,sp.bubble.a+0.1);
          if(sp.bubble.t>55)sp.bubble.phase='out';
          if(sp.bubble.phase==='out')sp.bubble.a=Math.max(0,sp.bubble.a-0.07);
          if(sp.bubble.a<=0){sp.bubble=null;}
          else{
            ctx.save();ctx.globalAlpha=sp.bubble.a;
            ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='bottom';
            ctx.fillText(sp.bubble.em,sp.x+sp.w/2,sp.y-4);
            ctx.restore();
          }
        }
      });

      // 이모지 파티클
      particles.forEach(function(p){
        p.life+=p.ls;p.x+=p.vx+Math.sin(p.life)*0.4;p.y+=p.vy;
        if(p.y<-30){p.y=H+10;p.x=Math.random()*W;}
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;
        ctx.save();ctx.globalAlpha=Math.max(0,0.5+Math.sin(p.life)*0.4);
        ctx.font=p.sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(p.em,p.x,p.y);ctx.restore();
      });

      arRaf=requestAnimationFrame(loop);
    }
    loop();
  })
  .catch(function(err){
    // 카메라 없으면 검정 배경에 피사체만
    ctx.fillStyle='#0d0d2b';
    ctx.fillRect(0,0,W,H);
    var sprites=[];
    var TYPES=['walk','bounce','float'];
    subjectCanvases.forEach(function(sc,i){
      var asp=sc.width/sc.height;
      var sh=H*(0.22+Math.random()*0.12);
      var sw=sh*asp;
      sprites.push({canvas:sc,w:sw,h:sh,x:Math.random()*(W-sw),y:H-sh-10,baseY:H-sh-10,vx:(Math.random()>0.5?1:-1)*(1.5+Math.random()*2),vy:0,life:Math.random()*Math.PI*2,type:TYPES[i%TYPES.length],flipX:false,actionT:0,actionMax:150+Math.random()*200,jumping:false,bubble:null});
    });
    var emojis=EMOJIS[lastTheme]||EMOJIS.generic;
    var particles=Array.from({length:10},function(){return{x:Math.random()*W,y:Math.random()*H,em:emojis[Math.floor(Math.random()*emojis.length)],sz:16+Math.random()*10,vx:(Math.random()-0.5)*0.8,vy:-0.5-Math.random()*0.5,life:Math.random()*Math.PI*2,ls:0.02};});
    // 별
    var stars=Array.from({length:80},function(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,a:Math.random(),s:0.005+Math.random()*0.008};});

    function loop2(){
      ctx.fillStyle='#0d0d2b';ctx.fillRect(0,0,W,H);
      // 별
      stars.forEach(function(s){s.a+=s.s;if(s.a>1)s.a=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+s.a.toFixed(2)+')';ctx.fill();});
      sprites.forEach(function(sp){
        sp.life+=0.04;sp.actionT++;
        if(sp.actionT>sp.actionMax){sp.actionT=0;sp.actionMax=120+Math.random()*200;var r=Math.random();if(r<0.35&&!sp.jumping&&sp.type==='walk'){sp.jumping=true;sp.vy=-(7+Math.random()*5);var bl=['😊','🎉','✨','💪','🌟'];sp.bubble={em:bl[Math.floor(Math.random()*bl.length)],a:0,phase:'in',t:0};}else if(r<0.6){sp.vx*=-1;sp.flipX=!sp.flipX;}else{sp.vx=(Math.random()>0.5?1:-1)*(1.2+Math.random()*2.5);sp.flipX=sp.vx<0;}}
        if(sp.type==='walk'){sp.x+=sp.vx;if(sp.jumping||sp.vy!==0){sp.vy+=0.4;sp.y+=sp.vy;if(sp.y>=sp.baseY){sp.y=sp.baseY;sp.vy=0;sp.jumping=false;}}else sp.y=sp.baseY+Math.sin(sp.life*2)*2;}
        else if(sp.type==='bounce'){sp.x+=sp.vx;sp.vy+=0.35;sp.y+=sp.vy;if(sp.y+sp.h>=H-5){sp.y=H-sp.h-5;sp.vy=-(5+Math.random()*4);}}
        else{sp.x+=sp.vx+Math.cos(sp.life*0.7)*0.8;sp.y=sp.baseY-60+Math.sin(sp.life*0.9)*35;}
        if(sp.x<0){sp.x=0;sp.vx=Math.abs(sp.vx);sp.flipX=false;}if(sp.x+sp.w>W){sp.x=W-sp.w;sp.vx=-Math.abs(sp.vx);sp.flipX=true;}sp.y=Math.max(0,Math.min(H-sp.h,sp.y));
        // 그림자
        ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(sp.x+sp.w/2,Math.min(sp.y+sp.h+4,H-4),sp.w*0.38,6,0,0,Math.PI*2);ctx.fill();ctx.restore();
        ctx.save();if(sp.flipX){ctx.translate(sp.x+sp.w,sp.y);ctx.scale(-1,1);ctx.drawImage(sp.canvas,0,0,sp.w,sp.h);}else{ctx.drawImage(sp.canvas,sp.x,sp.y,sp.w,sp.h);}ctx.restore();
        if(sp.bubble){sp.bubble.t++;if(sp.bubble.phase==='in')sp.bubble.a=Math.min(1,sp.bubble.a+0.1);if(sp.bubble.t>55)sp.bubble.phase='out';if(sp.bubble.phase==='out')sp.bubble.a=Math.max(0,sp.bubble.a-0.07);if(sp.bubble.a<=0){sp.bubble=null;}else{ctx.save();ctx.globalAlpha=sp.bubble.a;ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='bottom';ctx.fillText(sp.bubble.em,sp.x+sp.w/2,sp.y-4);ctx.restore();}}
      });
      particles.forEach(function(p){p.life+=p.ls;p.x+=p.vx+Math.sin(p.life)*0.4;p.y+=p.vy;if(p.y<-30){p.y=H+10;p.x=Math.random()*W;}if(p.x<0)p.x=W;if(p.x>W)p.x=0;ctx.save();ctx.globalAlpha=Math.max(0,0.5+Math.sin(p.life)*0.4);ctx.font=p.sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.em,p.x,p.y);ctx.restore();});
      arRaf=requestAnimationFrame(loop2);
    }
    loop2();
  });
}
