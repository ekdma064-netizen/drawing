<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>살아있는 그림 🎨</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0a0a1a; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
h1 { font-size: 1.7rem; font-weight: 800; background: linear-gradient(90deg,#a78bfa,#60a5fa,#f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin: 8px 0 4px; }
.sub { color: #888; font-size: 0.9rem; text-align: center; margin-bottom: 20px; }
.card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; width: 100%; max-width: 580px; margin-bottom: 16px; }
label.upload { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed rgba(167,139,250,0.5); background: rgba(167,139,250,0.05); color: #a78bfa; font-weight: 700; padding: 36px 20px; border-radius: 16px; cursor: pointer; text-align: center; gap: 8px; }
label.upload:hover { background: rgba(167,139,250,0.1); }
button { display: block; width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s; }
button:hover { opacity: 0.88; }
.btn-purple { background: linear-gradient(135deg,#7c3aed,#4f46e5); color: white; }
.btn-yellow { background: linear-gradient(135deg,#f59e0b,#ef4444); color: white; font-size: 1.1rem; }
.btn-gray { background: rgba(255,255,255,0.1); color: #aaa; }
.btn-green { background: linear-gradient(135deg,#10b981,#3b82f6); color: white; }
#videoBox { display: none; position: relative; margin-top: 12px; }
video { width: 100%; border-radius: 12px; display: block; }
#snapBtn { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 50%; background: white; border: 4px solid #7c3aed; font-size: 1.5rem; cursor: pointer; margin-top: 0; padding: 0; }
img.preview { width: 100%; border-radius: 12px; display: block; }
.spinner-wrap { text-align: center; padding: 30px; }
.spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.mode-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.mode-tab { flex: 1; padding: 12px 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #aaa; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-tab.active { background: rgba(167,139,250,0.2); border-color: #a78bfa; color: #a78bfa; }
#threeCanvas { display: block; width: 100%; height: 340px; cursor: grab; border-radius: 16px; background: #0d0d2b; }
#threeCanvas:active { cursor: grabbing; }
.ar-wrap { position: relative; border-radius: 16px; overflow: hidden; background: #111; }
#arVid { width: 100%; display: block; border-radius: 16px; }
#arOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border-radius: 16px; }
.desc { background: rgba(167,139,250,0.1); border-left: 3px solid #a78bfa; border-radius: 10px; padding: 14px 16px; margin-top: 14px; font-size: 0.9rem; color: #ccc; line-height: 1.6; }
.hidden { display: none !important; }
.hint { text-align: center; font-size: 0.78rem; color: #555; margin-top: 6px; }
.tip-box { background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; color: #bbb; margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>

<div style="font-size:2.5rem;text-align:center;margin-top:4px">🎨</div>
<h1>살아있는 그림</h1>
<p class="sub">피사체가 AR로 튀어나와요! ✨</p>

<!-- 업로드 -->
<div class="card" id="cardUpload">
  <label class="upload" for="fileIn">
    <span style="font-size:2rem">🖼️</span>
    <span>여기를 눌러서 그림을 업로드하세요</span>
    <span style="font-size:0.8rem;color:#555;font-weight:400">흰/밝은 배경의 그림이 가장 잘 돼요!</span>
    <input type="file" id="fileIn" accept="image/*" style="display:none">
  </label>
  <button class="btn-purple" id="camBtn">📷 카메라로 찍기</button>
  <div id="videoBox">
    <video id="vid" autoplay playsinline muted></video>
    <button id="snapBtn">📸</button>
  </div>
  <div class="tip-box">💡 하얀 종이에 그린 그림을 찍으면 배경이 자동으로 제거돼요!</div>
</div>

<!-- 미리보기 -->
<div class="card hidden" id="cardPreview">
  <img class="preview" id="previewImg" alt="미리보기">
  <button class="btn-yellow" id="goBtn">✨ 피사체를 꺼내줘!</button>
  <button class="btn-gray" id="resetBtn1">🔄 다시 선택</button>
</div>

<!-- 로딩 -->
<div class="card hidden" id="cardLoading">
  <div class="spinner-wrap">
    <div class="spinner"></div>
    <p id="loadingText" style="color:#888">AI가 그림을 분석하는 중... 🔍</p>
  </div>
</div>

<!-- 결과 -->
<div class="card hidden" id="cardResult">
  <div class="mode-tabs">
    <div class="mode-tab active" id="tabAR" onclick="switchMode('ar')">📷 AR 카메라</div>
    <div class="mode-tab" id="tab3d" onclick="switchMode('3d')">🌐 3D 회전</div>
  </div>

  <!-- AR -->
  <div id="viewAR">
    <div class="ar-wrap">
      <video id="arVid" autoplay playsinline muted></video>
      <canvas id="arOverlay"></canvas>
    </div>
    <p class="hint">피사체가 카메라 위에서 살아 움직여요! 📷</p>
  </div>

  <!-- 3D -->
  <div id="view3d" class="hidden">
    <canvas id="threeCanvas"></canvas>
    <p class="hint">드래그로 회전 · 스크롤로 줌</p>
  </div>

  <div class="desc" id="descText"></div>
  <button class="btn-green" id="reBtn" style="margin-top:14px">🔮 다시 마법 걸기</button>
  <button class="btn-gray" id="resetBtn2">🔄 새 그림 선택</button>
</div>

<script>
var imgSrc=null, b64=null, mstream=null, arStream=null;
var rafIds={three:null,ar:null};
var currentMode='ar', lastTheme='generic';
var threeRenderer=null, subjectCanvases=[];

var EMOJIS={nature:["🌸","🍃","🦋","🌻"],ocean:["🐠","🫧","🌊","🐙"],space:["⭐","✨","💫","🌟"],animals:["🐾","💕","✨","🌟"],people:["💗","🎵","✨","🎉"],vehicles:["💨","⭐","💥","🌟"],fantasy:["✨","💫","🌈","🔮"],generic:["✨","⭐","💫","🌟"]};

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function stopRaf(k){if(rafIds[k]){cancelAnimationFrame(rafIds[k]);rafIds[k]=null;}}
function stopAllRafs(){Object.keys(rafIds).forEach(stopRaf);}
function stopAR(){if(arStream){arStream.getTracks().forEach(function(t){t.stop();});arStream=null;}}

// 파일 읽기
document.getElementById('fileIn').addEventListener('change',function(){
  var file=this.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){imgSrc=e.target.result;b64=e.target.result.split(',')[1];document.getElementById('previewImg').src=imgSrc;hide('cardUpload');show('cardPreview');};
  r.readAsDataURL(file);
});

document.getElementById('camBtn').addEventListener('click',function(){
  if(mstream){stopMCam();return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(function(s){mstream=s;document.getElementById('vid').srcObject=s;document.getElementById('videoBox').style.display='block';document.getElementById('camBtn').textContent='✖ 닫기';})
    .catch(function(){alert('카메라를 사용할 수 없어요. 파일 업로드를 이용해주세요.');});
});
document.getElementById('snapBtn').addEventListener('click',function(){
  var v=document.getElementById('vid'),c=document.createElement('canvas');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(function(blob){var r=new FileReader();r.onload=function(e){imgSrc=e.target.result;b64=e.target.result.split(',')[1];document.getElementById('previewImg').src=imgSrc;stopMCam();hide('cardUpload');show('cardPreview');};r.readAsDataURL(blob);},'image/jpeg',0.92);
});
function stopMCam(){if(mstream){mstream.getTracks().forEach(function(t){t.stop();});mstream=null;}document.getElementById('videoBox').style.display='none';document.getElementById('camBtn').textContent='📷 카메라로 찍기';}

function reset(){stopAllRafs();stopMCam();stopAR();if(threeRenderer){threeRenderer.dispose();threeRenderer=null;}subjectCanvases=[];b64=null;imgSrc=null;document.getElementById('fileIn').value='';hide('cardPreview');hide('cardResult');hide('cardLoading');show('cardUpload');}
document.getElementById('resetBtn1').addEventListener('click',reset);
document.getElementById('resetBtn2').addEventListener('click',reset);
document.getElementById('reBtn').addEventListener('click',function(){stopAllRafs();stopAR();switchMode(currentMode);});

// ── 배경 제거 ──
function removeBackground(imgEl, tol) {
  tol = tol||50;
  var c=document.createElement('canvas');
  c.width=imgEl.naturalWidth||imgEl.width;
  c.height=imgEl.naturalHeight||imgEl.height;
  var ctx=c.getContext('2d');
  ctx.drawImage(imgEl,0,0,c.width,c.height);
  var d=ctx.getImageData(0,0,c.width,c.height), px=d.data;
  var W=c.width, H=c.height;

  // 가장자리 픽셀 샘플로 배경색 결정
  var samples=[];
  var step=Math.max(1,Math.floor(W/20));
  for(var x=0;x<W;x+=step){ samples.push([px[(0*W+x)*4],px[(0*W+x)*4+1],px[(0*W+x)*4+2]]); samples.push([px[((H-1)*W+x)*4],px[((H-1)*W+x)*4+1],px[((H-1)*W+x)*4+2]]); }
  for(var y=0;y<H;y+=step){ samples.push([px[(y*W+0)*4],px[(y*W+0)*4+1],px[(y*W+0)*4+2]]); samples.push([px[(y*W+(W-1))*4],px[(y*W+(W-1))*4+1],px[(y*W+(W-1))*4+2]]); }
  // 평균 배경색
  var br=0,bg=0,bb=0;
  samples.forEach(function(s){br+=s[0];bg+=s[1];bb+=s[2];});
  br=br/samples.length; bg=bg/samples.length; bb=bb/samples.length;

  for(var i=0;i<px.length;i+=4){
    var dr=px[i]-br, dg=px[i+1]-bg, db=px[i+2]-bb;
    var dist=Math.sqrt(dr*dr+dg*dg+db*db);
    if(dist<tol){
      var a=Math.max(0,(dist-tol*0.4)/(tol*0.6));
      px[i+3]=Math.round(px[i+3]*a);
    }
  }
  ctx.putImageData(d,0,0);
  return c;
}

// ── 피사체 분리 ──
function extractSubjects(bgC, maxN) {
  maxN=maxN||5;
  var W=bgC.width, H=bgC.height;
  var ctx=bgC.getContext('2d');
  var px=ctx.getImageData(0,0,W,H).data;

  // 각 열에 불투명 픽셀 있는지
  var cols=[];
  for(var x=0;x<W;x++){
    var has=false;
    for(var y=0;y<H;y++){if(px[(y*W+x)*4+3]>20){has=true;break;}}
    cols.push(has);
  }

  // 연속 구간 찾기
  var segs=[], inS=false, sX=0;
  for(var x=0;x<W;x++){
    if(cols[x]&&!inS){inS=true;sX=x;}
    else if(!cols[x]&&inS){inS=false;if(x-sX>W*0.03)segs.push([sX,x-1]);}
  }
  if(inS)segs.push([sX,W-1]);

  // 너무 좁은 구간 제거
  segs=segs.filter(function(s){return s[1]-s[0]>W*0.03;});

  // 최대 maxN개로 병합
  while(segs.length>maxN){
    var minG=Infinity,mi=0;
    for(var i=0;i<segs.length-1;i++){var g=segs[i+1][0]-segs[i][1];if(g<minG){minG=g;mi=i;}}
    segs[mi]=[segs[mi][0],segs[mi+1][1]];
    segs.splice(mi+1,1);
  }

  // 구간이 없으면 전체 이미지 사용
  if(segs.length===0) return [bgC];

  return segs.map(function(seg){
    var x0=Math.max(0,seg[0]-2), x1=Math.min(W-1,seg[1]+2);
    // 세로 bounding box도 계산
    var yMin=H, yMax=0;
    for(var y=0;y<H;y++){for(var x=x0;x<=x1;x++){if(px[(y*W+x)*4+3]>20){yMin=Math.min(yMin,y);yMax=Math.max(yMax,y);break;}}}
    yMin=Math.max(0,yMin-2); yMax=Math.min(H-1,yMax+2);
    var sw=x1-x0+1, sh=yMax-yMin+1;
    var sc=document.createElement('canvas');
    sc.width=sw; sc.height=sh;
    sc.getContext('2d').drawImage(bgC,x0,yMin,sw,sh,0,0,sw,sh);
    return sc;
  });
}

// ── AI 분석 + 배경 제거 ──
document.getElementById('goBtn').addEventListener('click',function(){
  if(!b64)return;
  hide('cardPreview'); show('cardLoading');
  document.getElementById('loadingText').textContent='AI가 그림을 분석하는 중... 🔍';

  function processImage(theme, desc){
    lastTheme=theme||'generic';
    document.getElementById('descText').textContent=desc||'멋진 그림이에요! ✨';
    document.getElementById('loadingText').textContent='피사체를 추출하는 중... ✂️';
    var img=new Image();
    img.onload=function(){
      var bgR=removeBackground(img,50);
      subjectCanvases=extractSubjects(bgR,5);
      hide('cardLoading'); show('cardResult');
      setTimeout(function(){switchMode('ar');},100);
    };
    img.src=imgSrc;
  }

  fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})})
    .then(function(r){return r.json();})
    .then(function(info){processImage(info.theme,info.description);})
    .catch(function(){processImage('generic','멋진 그림이에요! ✨');});
});

function switchMode(mode){
  currentMode=mode;
  stopAllRafs(); stopAR();
  ['AR','3d'].forEach(function(m){
    document.getElementById('view'+m).classList.add('hidden');
    document.getElementById('tab'+m).classList.remove('active');
  });
  show('view'+mode); // viewAR or view3d
  document.getElementById('tab'+mode).classList.add('active');
  if(mode==='ar') setTimeout(initAR,80);
  else if(mode==='3d') setTimeout(init3D,80);
}

// ── AR 모드 ──
function initAR(){
  var vid=document.getElementById('arVid');
  var cvs=document.getElementById('arOverlay');

  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}},audio:false})
    .then(function(s){
      arStream=s;
      vid.srcObject=s;
      vid.play().catch(function(){});

      function onMeta(){
        vid.removeEventListener('loadedmetadata',onMeta);
        var VW=vid.videoWidth||640, VH=vid.videoHeight||480;
        cvs.width=VW; cvs.height=VH;
        var ctx=cvs.getContext('2d');
        var emojis=EMOJIS[lastTheme]||EMOJIS.generic;

        // 피사체 스프라이트 초기화
        var sprites=[];
        var srcs=subjectCanvases.length>0 ? subjectCanvases : [null];

        srcs.forEach(function(sc,idx){
          var naturalW=sc?sc.width:100, naturalH=sc?sc.height:100;
          var scale=VH*(0.2+Math.random()*0.15)/naturalH;
          var sw=naturalW*scale, sh=naturalH*scale;
          var types=['walk','bounce','float','patrol'];
          var t=types[idx%types.length];
          var sp={
            canvas:sc, w:sw, h:sh,
            x:Math.random()*(VW-sw), y:VH-sh-20,
            vx:(Math.random()>0.5?1:-1)*(1.5+Math.random()*2),
            vy:0, baseY:VH-sh-20,
            flipX:false, life:Math.random()*Math.PI*2,
            type:t,
            // 걷기용 발 애니
            legPhase:0,
            // 특수 행동 타이머
            actionTimer:Math.random()*200,
            actionMax:150+Math.random()*200,
            jumping:false,
            // 이모지 말풍선
            bubble:null, bubbleTimer:0
          };
          sprites.push(sp);
        });

        // 이모지 파티클
        var particles=Array.from({length:12},function(){
          return{x:Math.random()*VW,y:Math.random()*VH,em:emojis[Math.floor(Math.random()*emojis.length)],sz:16+Math.random()*12,vx:(Math.random()-0.5)*0.8,vy:-Math.random()*0.6-0.2,life:Math.random()*Math.PI*2,ls:0.02};
        });

        var frame=0;
        function loop(){
          ctx.clearRect(0,0,VW,VH);
          frame++;

          sprites.forEach(function(sp,si){
            sp.life+=0.04;
            sp.actionTimer++;

            // 특수 행동 트리거
            if(sp.actionTimer>sp.actionMax){
              sp.actionTimer=0;
              sp.actionMax=100+Math.random()*250;
              var rnd=Math.random();
              if(rnd<0.3&&!sp.jumping){
                // 점프
                sp.jumping=true;
                sp.vy=-(8+Math.random()*6);
                // 말풍선
                var bems=['😊','🎉','✨','💪','🌟','😄'];
                sp.bubble={em:bems[Math.floor(Math.random()*bems.length)],alpha:0,phase:'in'};
                sp.bubbleTimer=0;
              } else if(rnd<0.5){
                // 방향 전환
                sp.vx*=-1; sp.flipX=!sp.flipX;
              } else if(rnd<0.7){
                // 속도 변화
                sp.vx=(Math.random()>0.5?1:-1)*(1+Math.random()*3);
                if(sp.vx<0)sp.flipX=true; else sp.flipX=false;
              }
            }

            // 이동 처리
            if(sp.type==='walk'||sp.type==='patrol'){
              sp.x+=sp.vx;
              // 중력/점프
              if(sp.jumping||sp.vy!==0){
                sp.vy+=0.45;
                sp.y+=sp.vy;
                if(sp.y>=sp.baseY){sp.y=sp.baseY;sp.vy=0;sp.jumping=false;}
              } else {
                sp.y=sp.baseY+Math.sin(sp.life*1.5)*3; // 미세 흔들림
              }
              if(sp.x<0){sp.x=0;sp.vx=Math.abs(sp.vx);sp.flipX=false;}
              if(sp.x+sp.w>VW){sp.x=VW-sp.w;sp.vx=-Math.abs(sp.vx);sp.flipX=true;}
            } else if(sp.type==='bounce'){
              sp.x+=sp.vx;
              sp.vy+=0.35;
              sp.y+=sp.vy;
              if(sp.y+sp.h>=VH-5){
                sp.y=VH-sp.h-5;
                sp.vy=-(5+Math.random()*5);
                sp.baseY=sp.y;
              }
              if(sp.x<0){sp.x=0;sp.vx=Math.abs(sp.vx);sp.flipX=false;}
              if(sp.x+sp.w>VW){sp.x=VW-sp.w;sp.vx=-Math.abs(sp.vx);sp.flipX=true;}
            } else if(sp.type==='float'){
              sp.x+=sp.vx+Math.cos(sp.life*0.7)*1.2;
              sp.y=sp.baseY-80+Math.sin(sp.life*0.8)*40;
              if(sp.x<0){sp.x=0;sp.vx=Math.abs(sp.vx);sp.flipX=false;}
              if(sp.x+sp.w>VW){sp.x=VW-sp.w;sp.vx=-Math.abs(sp.vx);sp.flipX=true;}
            }

            // 그림자 (바닥에 있을 때)
            var shadowY=Math.min(sp.y+sp.h, VH-8);
            var shadowAlpha=Math.max(0.05,0.25*(1-(sp.y+sp.h-sp.baseY-sp.h)/(VH*0.5)));
            ctx.save();
            ctx.globalAlpha=shadowAlpha;
            ctx.fillStyle='#000';
            ctx.beginPath();
            ctx.ellipse(sp.x+sp.w/2, shadowY, sp.w*0.4, 7, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            // 피사체 그리기
            ctx.save();
            if(sp.flipX){
              ctx.translate(sp.x+sp.w,sp.y);
              ctx.scale(-1,1);
              if(sp.canvas) ctx.drawImage(sp.canvas,0,0,sp.w,sp.h);
              else{ ctx.fillStyle='rgba(167,139,250,0.7)'; ctx.fillRect(0,0,sp.w,sp.h); }
            } else {
              ctx.translate(sp.x,sp.y);
              if(sp.canvas) ctx.drawImage(sp.canvas,0,0,sp.w,sp.h);
              else{ ctx.fillStyle='rgba(167,139,250,0.7)'; ctx.fillRect(0,0,sp.w,sp.h); }
            }
            ctx.restore();

            // 말풍선 이모지
            if(sp.bubble){
              sp.bubbleTimer++;
              if(sp.bubble.phase==='in'&&sp.bubble.alpha<1) sp.bubble.alpha=Math.min(1,sp.bubble.alpha+0.08);
              if(sp.bubbleTimer>60) sp.bubble.phase='out';
              if(sp.bubble.phase==='out') sp.bubble.alpha=Math.max(0,sp.bubble.alpha-0.06);
              if(sp.bubble.alpha<=0) sp.bubble=null;
              else {
                ctx.save();
                ctx.globalAlpha=sp.bubble.alpha;
                ctx.font='28px serif';
                ctx.textAlign='center';
                ctx.textBaseline='middle';
                ctx.fillText(sp.bubble.em, sp.x+sp.w/2, sp.y-20);
                ctx.restore();
              }
            }
          });

          // 이모지 파티클
          particles.forEach(function(p){
            p.life+=p.ls; p.x+=p.vx+Math.sin(p.life)*0.4; p.y+=p.vy;
            if(p.y<-30){p.y=VH+10;p.x=Math.random()*VW;}
            if(p.x<0)p.x=VW; if(p.x>VW)p.x=0;
            ctx.save();
            ctx.globalAlpha=Math.max(0,0.45+Math.sin(p.life)*0.4);
            ctx.font=p.sz+'px serif';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(p.em,p.x,p.y);
            ctx.restore();
          });

          rafIds.ar=requestAnimationFrame(loop);
        }
        loop();
      }
      vid.addEventListener('loadedmetadata',onMeta);
      if(vid.readyState>=1) onMeta();
    })
    .catch(function(){
      document.getElementById('viewAR').innerHTML='<div style="text-align:center;padding:50px 20px;color:#666;font-size:0.95rem;line-height:2">📵 카메라 권한이 없어요<br>브라우저 주소창 🔒 아이콘 → 카메라 허용<br><br><button onclick="switchMode(\'ar\')" style="background:#7c3aed;color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:700">다시 시도</button></div>';
    });
}

// ── 3D ──
function init3D(){
  var canvas=document.getElementById('threeCanvas');
  var W=canvas.parentElement.offsetWidth||540, H=340;
  canvas.width=W; canvas.height=H;
  if(threeRenderer){threeRenderer.dispose();threeRenderer=null;}
  threeRenderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false});
  threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  threeRenderer.setSize(W,H);
  threeRenderer.setClearColor(0x0d0d2b,1);
  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(50,W/H,0.1,100);
  camera.position.z=2.8;
  scene.add(new THREE.AmbientLight(0xffffff,0.8));
  var dl=new THREE.DirectionalLight(0xa78bfa,1.5); dl.position.set(3,3,5); scene.add(dl);
  var dl2=new THREE.DirectionalLight(0x60a5fa,0.8); dl2.position.set(-3,-2,2); scene.add(dl2);
  var tex=new THREE.TextureLoader().load(imgSrc,function(){});
  tex.minFilter=THREE.LinearFilter;
  var geo=new THREE.BoxGeometry(2.2,1.65,0.1);
  var pur=new THREE.MeshPhongMaterial({color:0x5b21b6});
  var mesh=new THREE.Mesh(geo,[pur,pur,pur,pur,new THREE.MeshPhongMaterial({map:tex}),pur]);
  scene.add(mesh);
  var pGeo=new THREE.BufferGeometry();
  var pos=[];
  for(var i=0;i<300;i++){pos.push((Math.random()-0.5)*12,(Math.random()-0.5)*12,(Math.random()-0.5)*8);}
  pGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0xffffff,size:0.03,transparent:true,opacity:0.5})));
  var drag={on:false,x:0,y:0};
  canvas.addEventListener('mousedown',function(e){drag.on=true;drag.x=e.clientX;drag.y=e.clientY;});
  window.addEventListener('mouseup',function(){drag.on=false;});
  window.addEventListener('mousemove',function(e){if(!drag.on)return;mesh.rotation.y+=(e.clientX-drag.x)*0.012;mesh.rotation.x+=(e.clientY-drag.y)*0.012;drag.x=e.clientX;drag.y=e.clientY;});
  canvas.addEventListener('touchstart',function(e){drag.on=true;drag.x=e.touches[0].clientX;drag.y=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchend',function(){drag.on=false;});
  window.addEventListener('touchmove',function(e){if(!drag.on)return;mesh.rotation.y+=(e.touches[0].clientX-drag.x)*0.014;mesh.rotation.x+=(e.touches[0].clientY-drag.y)*0.014;drag.x=e.touches[0].clientX;drag.y=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('wheel',function(e){camera.position.z=Math.max(1.2,Math.min(6,camera.position.z+e.deltaY*0.005));});
  var t=0;
  function loop(){rafIds.three=requestAnimationFrame(loop);t+=0.02;if(!drag.on){mesh.rotation.y+=0.007;mesh.rotation.x=Math.sin(t)*0.12;}threeRenderer.render(scene,camera);}
  loop();
}
</script>
